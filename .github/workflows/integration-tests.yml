name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- Infrastructure via Docker Compose ----------
      - name: Start Docker Compose
        run: |
          docker compose up -d
          for i in {1..30}; do
            if docker compose ps | grep -q "healthy"; then
              echo "All services healthy"
              break
            fi
            sleep 2
          done

      # ---------- Create all required Kafka topics (once) ----------
      - name: Create Kafka topics
        run: |
          docker exec -i archon-kafka kafka-topics --bootstrap-server localhost:9092 --create --if-not-exists --topic build.requests --partitions 1 --replication-factor 1
          docker exec -i archon-kafka kafka-topics --bootstrap-server localhost:9092 --create --if-not-exists --topic build.requests.retry --partitions 1 --replication-factor 1
          docker exec -i archon-kafka kafka-topics --bootstrap-server localhost:9092 --create --if-not-exists --topic build.requests.dlq --partitions 1 --replication-factor 1
          docker exec -i archon-kafka kafka-topics --bootstrap-server localhost:9092 --create --if-not-exists --topic build.status --partitions 1 --replication-factor 1

      # ---------- Go setup ----------
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: |
            go.work.sum
            services/api-gateway/go.sum
            services/stitcher/go.sum
            internal/go.sum

      - name: Sync Go workspace
        run: go work sync

      # ---------- Python setup ----------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          pip install poetry
          cd services/ai-brain
          mkdir -p src          # satisfy pyproject.toml source layout
          poetry install

      # ---------- Protobuf generation ----------
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protoc-gen-go and protoc-gen-go-grpc
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Regenerate protobuf stubs
        run: |
          make proto
          sed -i 's/^import manifest_pb2 as/from . import manifest_pb2 as/' services/ai-brain/proto/manifest_pb2_grpc.py

      # ---------- Start AI Brain with mock LLM ----------
      - name: Start AI Brain (mock)
        run: |
          cd services/ai-brain
          GEMINI_MODEL=mock REDIS_URL=redis://localhost:6379/0 ATOMIC_LIBRARY_PATH=../../atomic-library/index.json \
          poetry run python -m grpc_server.server &
          sleep 3

      # ---------- Run integration tests ----------
      - name: AI Brain integration tests
        run: |
          cd services/ai-brain
          poetry run pytest tests/integration/ -v

      - name: Run API Gateway integration tests
        env:
          DATABASE_URL: postgres://archon_user:archon_password@localhost:5433/archon_db?sslmode=disable
          TEST_DATABASE_URL: postgres://archon_user:archon_password@localhost:5433/archon_db?sslmode=disable
          AI_BRAIN_TARGET: localhost:50051
          REDIS_ADDR: localhost:6379
          KAFKA_BROKER: localhost:9092
        run: |
          cd services/api-gateway
          go run ./cmd/server/main.go &
          GATEWAY_PID=$!
          for i in $(seq 1 30); do
            if curl -s http://localhost:4000 >/dev/null 2>&1; then
              echo "Gateway is up"
              break
            fi
            sleep 1
          done
          go test -tags=integration -v ./tests/integration/
          kill $GATEWAY_PID 2>/dev/null || true

      - name: Run Stitcher integration tests
        env:
          KAFKA_BROKER: localhost:9092
          KAFKA_CONSUMER_GROUP: archon-stitcher-ci
          ATOMIC_LIBRARY_PATH: ../../atomic-library
          OTEL_EXPORTER_OTLP_ENDPOINT: localhost:4317
        run: |
          cd services/stitcher
          go test -tags=integration -v -p=1 ./tests/integration/

      # ---------- Cleanup ----------
      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v