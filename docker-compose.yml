services:
  # 1. PostgreSQL (State & Atomic Library Index)
  postgres:
    image: postgres:15-alpine
    container_name: archon-postgres
    environment:
      POSTGRES_USER: archon_user
      POSTGRES_PASSWORD: archon_password
      POSTGRES_DB: archon_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archon_user -d archon_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis (WebSocket Pub/Sub & Ephemeral State)
  redis:
    image: redis:7-alpine
    container_name: archon-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Jaeger (OpenTelemetry Distributed Tracing)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: archon-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # The Web UI for viewing traces
      - "4317:4317"   # OTLP gRPC receiver (where our Go/Python apps send logs)

  # 4. Zookeeper (Required to manage Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: archon-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # 5. Apache Kafka (The Event Bus)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: archon-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true" # Auto-creates topics when a service tries to use them

  # 6. Kafka UI (Visualizer for your Event Bus)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: archon-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

volumes:
  postgres_data: